<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jason - GolfSim Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { --primary: #00d4ff; --bg: #111; --card: #222; --danger: #ff4444; --success: #00ff00; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 15px; background: var(--bg); color: #eee; margin: 0; padding-bottom: 100px; }
        
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            align-items: center; justify-content: center; transition: opacity 0.8s ease;
        }
        #splash img { width: 120px; height: 120px; border-radius: 20px; margin-bottom: 20px; }

        h1 { color: var(--primary); font-size: 22px; text-align: center; margin: 15px 0; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 10px; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; }
        input { width: 100%; background: #000; border: 2px solid #444; color: #fff; padding: 12px; border-radius: 10px; box-sizing: border-box; font-size: 18px; outline: none; }
        
        /* Smash Alerts */
        .smash-poor { border-color: var(--danger) !important; color: var(--danger); }
        .smash-pro { border-color: var(--success) !important; color: var(--success); }
        .smash-god { border-color: #e040fb !important; color: #e040fb; }

        #trajectoryCanvas { width: 100%; height: 180px; background: #000; border-radius: 12px; margin: 15px 0; }
        .result-box { background: linear-gradient(135deg, var(--primary), #008fb3); color: #000; padding: 15px; border-radius: 12px; text-align: center; }
        .result-val { font-size: 24px; font-weight: 800; display: block; }
        
        /* Admin Section */
        .admin-section { border: 2px dashed #333; padding: 15px; border-radius: 12px; margin-top: 10px; transition: 0.3s; }
        .admin-section.unlocked { border-color: var(--primary); background: #1a1a1a; }
        #lockBtn { background: none; border: none; color: #666; font-size: 20px; cursor: pointer; float: right; margin-top: -5px; }

        .btn { background: #fff; color: #000; border: none; padding: 14px; width: 100%; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-compare.active { background: var(--danger); color: #fff; }
        
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 11px; }
        th { background: #333; color: var(--primary); padding: 10px; text-align: center; }
        td { border: 1px solid #333; padding: 8px; text-align: center; }
        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); color: #000; text-align: center; padding: 12px 0; font-weight: 900; font-size: 12px; }
    </style>
</head>
<body>

    <div id="splash">
        <img src="icon-png.png" alt="Logo">
        <h2 style="color:white; font-weight:200;">GOLFSIM PRO</h2>
    </div>

    <h1>🏌️ JASON GOLFSIM PRO</h1>

    <div class="card">
        <div class="grid">
            <div><label>Club Speed (mph)</label><input type="number" id="clubSpeed" value="100" oninput="runPhysics()"></div>
            <div><label>Attack Angle (°)</label><input type="number" id="attackAngle" value="3.0" oninput="runPhysics()"></div>
            <div><label>Launch Angle (°)</label><input type="number" id="launchAngle" value="12.0" oninput="runPhysics()"></div>
            <div><label>Smash Factor</label><input type="number" id="smashFactor" value="1.45" step="0.01" oninput="runPhysics()"></div>
        </div>

        <canvas id="trajectoryCanvas"></canvas>

        <div class="result-box">
            <div class="grid">
                <div><small>CARRY DISTANCE</small><span class="result-val" id="resDist">--</span></div>
                <div><small>MAX HEIGHT</small><span class="result-val" id="resHeight">--</span></div>
            </div>
            <button class="btn btn-compare" id="compareBtn" onclick="toggleComparison()">Save & Compare Swing</button>
        </div>
    </div>

    <div class="admin-section" id="adminArea">
        <button id="lockBtn" onclick="unlockAdmin()">🔒</button>
        <label>Admin: Trackman Ideal CSV</label>
        <input type="file" id="fileInput" disabled style="margin-top:10px;">
    </div>

    <div style="overflow-x: auto; margin-bottom: 60px;"> 
        <table id="dataTable"></table>
    </div>

    <footer class="sticky-footer"> &copy; JMM &bull; 2026 </footer>

<script>
    let ghostPoints = [], ghostDist = 0, ghostHeight = 0, compareModeActive = false;

    window.addEventListener('load', () => {
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => document.getElementById('splash').remove(), 800);
        }, 1200);
        runPhysics();
    });

    function unlockAdmin() {
        const pin = prompt("Enter Admin PIN:");
        if (pin === "1234") {
            document.getElementById('adminArea').classList.add('unlocked');
            document.getElementById('fileInput').disabled = false;
            document.getElementById('lockBtn').textContent = "🔓";
        } else {
            alert("Access Denied.");
        }
    }

    function runPhysics() {
        const speedMph = parseFloat(document.getElementById('clubSpeed').value) || 0;
        const smashInput = document.getElementById('smashFactor');
        const smash = parseFloat(smashInput.value) || 0;
        const launchDeg = parseFloat(document.getElementById('launchAngle').value) || 0;
        
        // Alert logic
        smashInput.classList.remove('smash-poor', 'smash-pro', 'smash-god');
        if (smash < 1.35) smashInput.classList.add('smash-poor');
        else if (smash >= 1.45 && smash <= 1.50) smashInput.classList.add('smash-pro');
        else if (smash > 1.50) smashInput.classList.add('smash-god');

        const ballSpeedMps = (speedMph * smash) * 0.44704;
        const angleRad = launchDeg * (Math.PI / 180);
        const g = 9.81, rho = 1.225, ballArea = 0.001432, ballMass = 0.0459, Cd = 0.22, Cl = 0.16;

        let vx = ballSpeedMps * Math.cos(angleRad);
        let vy = ballSpeedMps * Math.sin(angleRad);
        let x = 0, y = 0.01, dt = 0.01, points = [], maxH = 0;

        while (y > 0 && points.length < 2000) {
            let v = Math.sqrt(vx*vx + vy*vy);
            if (v < 0.1) break;
            let Fd = 0.5 * rho * v * v * ballArea * Cd;
            let Fl = 0.5 * rho * v * v * ballArea * Cl;
            let ax = (-Fd * (vx / v) - Fl * (vy / v)) / ballMass;
            let ay = (-g - (Fd * (vy / v)) + (Fl * (vx / v))) / ballMass;
            vx += ax * dt; vy += ay * dt; x += vx * dt; y += vy * dt;
            if (y > maxH) maxH = y;
            points.push({x: x * 1.09361, y: y * 1.09361});
        }

        document.getElementById('resDist').textContent = Math.round(x * 1.09361) + " yds";
        document.getElementById('resHeight').textContent = Math.round(maxH * 3.28084) + " ft";
        drawChart(points, x * 1.09361, maxH * 1.09361);
    }

    function drawChart(pts, d, hY) {
        const c = document.getElementById('trajectoryCanvas');
        const ctx = c.getContext('2d');
        c.width = c.offsetWidth * 2; c.height = c.offsetHeight * 2; ctx.scale(2, 2);
        const w = c.offsetWidth, h = c.offsetHeight, pad = 25;

        ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle = '#444'; ctx.beginPath(); ctx.moveTo(pad,h-pad); ctx.lineTo(w-pad,h-pad); ctx.stroke();

        const sX = (w - pad*2) / Math.max(d, ghostDist, 250);
        const sY = (h - pad*2) / Math.max(hY, ghostHeight, 40);

        if (compareModeActive && ghostPoints.length) {
            ctx.strokeStyle = '#666'; ctx.setLineDash([5,5]); ctx.beginPath();
            ghostPoints.forEach((p, i) => { if (i === 0) ctx.moveTo(pad + p.x*sX, (h-pad)-p.y*sY); else ctx.lineTo(pad + p.x*sX, (h-pad)-p.y*sY); });
            ctx.stroke(); ctx.setLineDash([]);
        }

        ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 3; ctx.beginPath();
        pts.forEach((p, i) => { if (i === 0) ctx.moveTo(pad + p.x*sX, (h-pad)-p.y*sY); else ctx.lineTo(pad + p.x*sX, (h-pad)-p.y*sY); });
        ctx.stroke();
        ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(pad + d*sX, h-pad, 4, 0, Math.PI*2); ctx.fill();
    }

    function toggleComparison() {
        const btn = document.getElementById('compareBtn');
        if (!compareModeActive) {
            // Save current data for ghosting
            const speedMph = parseFloat(document.getElementById('clubSpeed').value);
            const smash = parseFloat(document.getElementById('smashFactor').value);
            const launchDeg = parseFloat(document.getElementById('launchAngle').value);
            
            // Generate ghost points
            ghostPoints = []; 
            let vx = ((speedMph * smash) * 0.44704) * Math.cos(launchDeg * Math.PI/180);
            let vy = ((speedMph * smash) * 0.44704) * Math.sin(launchDeg * Math.PI/180);
            let gx=0, gy=0.01, gdt=0.01, gmaxH=0;
            while(gy > 0 && ghostPoints.length < 2000) {
                let v = Math.sqrt(vx*vx + vy*vy);
                let Fd = 0.5 * 1.225 * v * v * 0.001432 * 0.22;
                let Fl = 0.5 * 1.225 * v * v * 0.001432 * 0.16;
                vx += ((-Fd*(vx/v)-Fl*(vy/v))/0.0459)*gdt;
                vy += ((-9.81-(Fd*(vy/v))+(Fl*(vx/v)))/0.0459)*gdt;
                gx += vx*gdt; gy += vy*gdt;
                if (gy > gmaxH) gmaxH = gy;
                ghostPoints.push({x: gx*1.09361, y: gy*1.09361});
            }
            ghostDist = gx * 1.09361; ghostHeight = gmaxH * 1.09361;
            compareModeActive = true; btn.textContent = "Clear Comparison"; btn.classList.add('active');
        } else {
            compareModeActive = false; btn.textContent = "Save & Compare Swing"; btn.classList.remove('active');
            ghostPoints = []; ghostDist = 0; ghostHeight = 0;
        }
        runPhysics();
    }

    document.getElementById('fileInput').addEventListener('change', function(e){
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader(); reader.onload = function(event){
            const rows = event.target.result.split('\n').map(r => r.split(',')).filter(r => r.length > 1);
            renderTable(rows);
        }; reader.readAsText(file);
    });

    function renderTable(rows){
        const table = document.getElementById('dataTable'); let html = "<thead><tr>";
        rows[0].forEach(h => html += `<th>${h.trim()}</th>`); html += "</tr></thead><tbody>";
        rows.slice(1).forEach(row => { html += "<tr>"; row.forEach(v => html += `<td>${v.trim()}</td>`); html += "</tr>"; });
        table.innerHTML = html + "</tbody>";
    }
</script>
</body>
</html>
