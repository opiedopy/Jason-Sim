<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jason - GolfSim Pro</title>
    <style>
        :root { --primary: #00d4ff; --bg: #111; --card: #222; }
        body { font-family: sans-serif; padding: 15px; background: var(--bg); color: #eee; margin: 0; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid #333; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 10px; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
        input { width: 100%; background: #000; border: 2px solid #444; color: #fff; padding: 12px; border-radius: 10px; box-sizing: border-box; font-size: 18px; }
        #trajectoryCanvas { width: 100%; height: 200px; background: #000; border-radius: 12px; margin: 10px 0; border: 1px solid #333; }
        .result-box { background: linear-gradient(135deg, var(--primary), #008fb3); color: #000; padding: 15px; border-radius: 12px; text-align: center; }
        .result-val { font-size: 28px; font-weight: 800; display: block; }
        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); color: #000; text-align: center; padding: 10px 0; font-weight: bold; font-size: 12px; }
        .smash-pro { border-color: #00ff00 !important; color: #00ff00; }
    </style>
</head>
<body>

    <h1 style="color:var(--primary); text-align:center; font-size:20px;">🏌️ JASON GOLFSIM PRO</h1>

    <div class="card">
        <div class="grid">
            <div><label>Club Speed (mph)</label><input type="number" id="clubSpeed" value="100" oninput="runPhysics()"></div>
            <div><label>Attack Angle (°)</label><input type="number" id="attackAngle" value="3.6" oninput="runPhysics()"></div>
            <div><label>Launch Angle (°)</label><input type="number" id="launchAngle" value="12.0" oninput="runPhysics()"></div>
            <div><label>Smash Factor</label><input type="number" id="smashFactor" value="1.45" step="0.01" oninput="runPhysics()"></div>
        </div>

        <canvas id="trajectoryCanvas"></canvas>

        <div class="result-box">
            <div class="grid">
                <div><small>CARRY DISTANCE</small><span class="result-val" id="resDist">--</span></div>
                <div><small>MAX HEIGHT</small><span class="result-val" id="resHeight">--</span></div>
            </div>
        </div>
    </div>

    <footer class="sticky-footer"> © JMM • 2026 </footer>

<script>
    function runPhysics() {
        const clubSpeed = parseFloat(document.getElementById('clubSpeed').value) || 0;
        const smash = parseFloat(document.getElementById('smashFactor').value) || 0;
        const launch = parseFloat(document.getElementById('launchAngle').value) || 0;
        
        // Quality Color for Smash
        const smashInput = document.getElementById('smashFactor');
        smashInput.className = (smash >= 1.45 && smash <= 1.50) ? 'smash-pro' : '';

        // Initial Ball Velocity in Yards Per Second
        // 1 MPH = 0.488889 Yards/Sec
        const ballSpeedYps = (clubSpeed * smash) * 0.488889;
        const angleRad = launch * (Math.PI / 180);

        let vx = ballSpeedYps * Math.cos(angleRad);
        let vy = ballSpeedYps * Math.sin(angleRad);
        
        // Physics constants (tuned for yards/seconds)
        const gravity = 10.72; // Yards/s^2 (Standard 9.8m/s converted)
        const dragK = 0.0012;  // Simplified air resistance factor
        const liftK = 0.0006;  // Simplified Magnus lift factor

        let x = 0;
        let y = 0.1; // Start slightly above ground
        let dt = 0.02; // Time step
        let points = [];
        let maxHeight = 0;

        // Loop until ball hits ground (y=0)
        for (let i = 0; i < 500; i++) {
            let v = Math.sqrt(vx*vx + vy*vy);
            if (v < 1) break;

            // Simple Physics: Velocity - Gravity - Air Resistance + Lift
            let ax = -(dragK * v * vx); 
            let ay = -gravity - (dragK * v * vy) + (liftK * v * vx);

            vx += ax * dt;
            vy += ay * dt;
            x += vx * dt;
            y += vy * dt;

            if (y > maxHeight) maxHeight = y;
            points.push({x: x, y: y});

            if (y <= 0) break;
        }

        document.getElementById('resDist').textContent = Math.round(x) + " yds";
        document.getElementById('resHeight').textContent = Math.round(maxHeight * 3) + " ft";

        drawTrajectory(points, x, maxHeight);
    }

    function drawTrajectory(pts, d, h) {
        const c = document.getElementById('trajectoryCanvas');
        const ctx = c.getContext('2d');
        c.width = c.offsetWidth * 2; c.height = c.offsetHeight * 2;
        ctx.scale(2, 2);
        
        const w = c.offsetWidth, ht = c.offsetHeight, pad = 20;
        ctx.clearRect(0, 0, w, ht);

        // Ground line
        ctx.strokeStyle = '#333'; ctx.beginPath();
        ctx.moveTo(pad, ht - pad); ctx.lineTo(w - pad, ht - pad); ctx.stroke();

        // Scale trajectory to fit screen
        const scaleX = (w - pad * 2) / Math.max(d, 250);
        const scaleY = (ht - pad * 2) / Math.max(h, 40);

        ctx.strokeStyle = '#00d4ff';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(pad, ht - pad);

        pts.forEach(p => {
            ctx.lineTo(pad + p.x * scaleX, (ht - pad) - p.y * scaleY);
        });
        ctx.stroke();

        // Landing Spot
        ctx.fillStyle = '#fff'; ctx.beginPath();
        ctx.arc(pad + d * scaleX, ht - pad, 4, 0, Math.PI * 2); ctx.fill();
    }

    // Run immediately on load
    window.onload = runPhysics;
</script>
</body>
</html>
