<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jason - GolfSim Pro</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: -apple-system, system-ui, sans-serif; padding: 10px; background: var(--bg); color: #eee; margin: 0; padding-bottom: 80px; }
        
        h1 { color: var(--primary); font-size: 18px; text-align: center; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }

        /* Club Presets */
        .preset-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .preset-btn { flex: 1; background: #222; color: #888; border: 1px solid #333; padding: 10px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; }
        .preset-btn.active { background: var(--primary); color: #000; border-color: #fff; }

        /* Main Simulator Card */
        .card { background: var(--card); padding: 12px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: block; font-size: 9px; color: var(--primary); text-transform: uppercase; margin-bottom: 3px; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; }

        /* THE INTERACTIVE SCREEN */
        #interactiveWrapper { position: relative; margin: 10px 0; border: 1px solid #444; border-radius: 8px; overflow: hidden; background: #000; }
        #trajectoryCanvas { width: 100%; height: 200px; display: block; }

        /* Results Display */
        .result-box { background: var(--primary); color: #000; padding: 12px; border-radius: 8px; text-align: center; margin-top: 10px; }
        .result-val { font-size: 24px; font-weight: 900; display: block; line-height: 1; }
        
        /* Admin & Table Logic */
        #lockBtn { background: none; border: none; color: #444; font-size: 18px; cursor: pointer; float: right; padding: 5px; }
        .admin-section { display: none; margin-top: 15px; padding: 10px; border-top: 1px solid #333; }
        .admin-visible { display: block; }
        
        .table-scroll { overflow-x: auto; margin-top: 10px; max-height: 300px; border: 1px solid #333; }
        table { border-collapse: collapse; width: 100%; font-size: 11px; }
        th { background: #222; color: var(--primary); padding: 8px; border: 1px solid #333; position: sticky; top: 0; }
        td { padding: 6px; border: 1px solid #333; text-align: center; background: #111; }

        .sticky-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--primary); color: #000; text-align: center; padding: 10px 0; font-weight: 900; font-size: 11px; z-index: 100; }
    </style>
</head>
<body>

    <h1>🏌️ JASON GOLFSIM PRO</h1>

    <div class="preset-row">
        <button class="preset-btn active" onclick="setPreset('driver', this)">DRIVER</button>
        <button class="preset-btn" onclick="setPreset('iron', this)">7-IRON</button>
        <button class="preset-btn" onclick="setPreset('wedge', this)">WEDGE</button>
    </div>

    <div class="card">
        <div class="grid">
            <div><label>Club Speed</label><input type="number" id="clubSpeed" value="111" oninput="runPhysics()"></div>
            <div><label>Attack Angle</label><input type="number" id="attackAngle" value="3.6" oninput="runPhysics()"></div>
            <div><label>Launch Angle</label><input type="number" id="launchAngle" value="12.0" oninput="runPhysics()"></div>
            <div><label>Smash Factor</label><input type="number" id="smashFactor" value="1.45" step="0.01" oninput="runPhysics()"></div>
        </div>

        <div id="interactiveWrapper">
            <canvas id="trajectoryCanvas"></canvas>
        </div>

        <div class="result-box">
            <div class="grid">
                <div><small>CARRY</small><span class="result-val" id="resDist">--</span></div>
                <div><small>HEIGHT</small><span class="result-val" id="resHeight">--</span></div>
            </div>
        </div>
    </div>

    <button id="lockBtn" onclick="toggleAdmin()">🔒</button>
    
    <div class="admin-section" id="adminArea">
        <label>Import Trackman Data</label>
        <input type="file" id="fileInput" style="margin: 10px 0; font-size: 12px;">
        <div class="table-scroll">
            <table id="dataTable"></table>
        </div>
    </div>

    <footer class="sticky-footer"> &copy; JMM &bull; 2026 </footer>

<script>
    const presets = {
        driver: { launch: 12.0, smash: 1.45, attack: 3.6 },
        iron: { launch: 18.0, smash: 1.33, attack: -3.0 },
        wedge: { launch: 30.0, smash: 1.22, attack: -5.0 }
    };

    function setPreset(type, btn) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('launchAngle').value = presets[type].launch;
        document.getElementById('smashFactor').value = presets[type].smash;
        document.getElementById('attackAngle').value = presets[type].attack;
        runPhysics();
    }

    function toggleAdmin() {
        if (prompt("Enter Admin PIN:") === "1234") {
            const area = document.getElementById('adminArea');
            area.classList.toggle('admin-visible');
            document.getElementById('lockBtn').textContent = area.classList.contains('admin-visible') ? "🔓" : "🔒";
        }
    }

    function runPhysics() {
        const clubSpeed = parseFloat(document.getElementById('clubSpeed').value) || 0;
        const smash = parseFloat(document.getElementById('smashFactor').value) || 0;
        const launch = parseFloat(document.getElementById('launchAngle').value) || 0;

        const ballSpeedYps = (clubSpeed * smash) * 0.488889;
        const angleRad = launch * (Math.PI / 180);

        let vx = ballSpeedYps * Math.cos(angleRad), vy = ballSpeedYps * Math.sin(angleRad);
        const g = 10.72, drag = 0.0019, lift = 0.0006;
        let x = 0, y = 0.5, dt = 0.01, points = [], maxH = 0;

        for (let t = 0; t < 1500; t++) {
            let v = Math.sqrt(vx*vx + vy*vy);
            if (v < 0.1) break;
            vx += (-(drag * v * vx)) * dt;
            vy += (-g - (drag * v * vy) + (lift * v * vx)) * dt;
            x += vx * dt; y += vy * dt;
            if (y > maxH) maxH = y;
            points.push({x: x, y: y});
            if (y <= 0) break;
        }

        document.getElementById('resDist').textContent = Math.round(x) + " yds";
        document.getElementById('resHeight').textContent = Math.round(maxH * 3) + " ft";
        drawPlot(points, x, maxH);
    }

    function drawPlot(pts, totalX, totalY) {
        const canvas = document.getElementById('trajectoryCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight, pad = 20;

        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
        const scaleX = (w - pad * 2) / Math.max(totalX, 280);
        const scaleY = (h - pad * 2) / Math.max(totalY, 40);

        ctx.strokeStyle = "#333"; ctx.beginPath();
        ctx.moveTo(pad, h-pad); ctx.lineTo(w-pad, h-pad); ctx.stroke();

        ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 3; ctx.beginPath();
        ctx.moveTo(pad, h - pad);
        pts.forEach(p => ctx.lineTo(pad + (p.x * scaleX), (h - pad) - (p.y * scaleY)));
        ctx.stroke();

        ctx.fillStyle = "#fff"; ctx.beginPath();
        ctx.arc(pad + (totalX * scaleX), h - pad, 3, 0, Math.PI * 2); ctx.fill();
    }

    document.getElementById('fileInput').addEventListener('change', function(e){
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event){
            const rows = event.target.result.split('\n').map(r => r.split(',')).filter(r => r.length > 1);
            let html = "<thead><tr>" + rows[0].map(h => `<th>${h.trim()}</th>`).join('') + "</tr></thead><tbody>";
            rows.slice(1).forEach(row => html += "<tr>" + row.map(v => `<td>${v.trim()}</td>`).join('') + "</tr>");
            document.getElementById('dataTable').innerHTML = html + "</tbody>";
        };
        reader.readAsText(file);
    });

    window.onload = runPhysics;
</script>
</body>
</html>
