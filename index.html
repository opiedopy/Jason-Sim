<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jason - GolfSim Pro v7.0</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #1a1a1a; --danger: #ff4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 15px; }
        
        h1 { color: var(--primary); font-size: 20px; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* SECTION HEADERS */
        h2 { font-size: 14px; color: var(--primary); text-transform: uppercase; margin-top: 30px; }

        /* INPUT CARD */
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { display: block; font-size: 10px; color: #888; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; }

        /* THE GRAPH SCREEN */
        #interactiveWrapper { margin: 15px 0; border: 2px solid #333; border-radius: 10px; background: #000; height: 260px; }
        #trajectoryCanvas { width: 100%; height: 100%; display: block; }

        /* RECORD BUTTON */
        .btn-record { width: 100%; background: var(--primary); color: #000; padding: 15px; border-radius: 8px; font-weight: 900; border: none; font-size: 14px; cursor: pointer; margin-top: 10px; }

        /* DATA TABLE */
        .table-window { width: 100%; overflow: auto; background: #111; border: 1px solid #333; border-radius: 8px; margin-top: 10px; }
        table { border-collapse: collapse; width: 100%; font-size: 12px; }
        th { background: #222; color: var(--primary); padding: 12px; border: 1px solid #333; text-align: center; }
        td { padding: 12px; border: 1px solid #333; text-align: center; }
        .del-btn { color: var(--danger); font-weight: 900; cursor: pointer; background: none; border: none; }

        footer { text-align: center; color: #444; font-size: 10px; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>

    <h1>🏌️ JASON GOLFSIM last chance PRO</h1>

    <div class="card">
        <div class="grid">
            <div><label>Club Speed</label><input type="number" id="clubSpeed" value="111" oninput="runPhysics()"></div>
            <div><label>Smash Factor</label><input type="number" id="smashFactor" value="1.45" step="0.01" oninput="runPhysics()"></div>
        </div>

        <div id="interactiveWrapper">
            <canvas id="trajectoryCanvas"></canvas>
        </div>

        <button class="btn-record" onclick="saveShot()">RECORD SHOT TO ANALYTICS</button>
    </div>

    <h2>📊 Session Analytics</h2>
    <div class="table-window">
        <table>
            <thead>
                <tr>
                    <th>Speed</th>
                    <th>Carry</th>
                    <th>Height</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody id="shotLog"></tbody>
        </table>
    </div>

    <footer> JMM &bull; 2026 &bull; SINGLE-PAGE STABLE BUILD </footer>

<script>
    let sessionShots = [];

    function runPhysics() {
        const speed = parseFloat(document.getElementById('clubSpeed').value) || 0;
        const smash = parseFloat(document.getElementById('smashFactor').value) || 0;
        const ballSpeed = (speed * smash) * 0.488889;
        const launchAngle = 12; // Static for simplicity in this build
        const angleRad = launchAngle * (Math.PI / 180);

        let vx = ballSpeed * Math.cos(angleRad), vy = ballSpeed * Math.sin(angleRad);
        const g = 10.72, drag = 0.0020, lift = 0.0006;
        let x = 0, y = 0.5, dt = 0.01, points = [], maxH = 0;

        for (let t = 0; t < 1500; t++) {
            let v = Math.sqrt(vx*vx + vy*vy);
            if (v < 0.1) break;
            vx += (-(drag * v * vx)) * dt;
            vy += (-g - (drag * v * vy) + (lift * v * vx)) * dt;
            x += vx * dt; y += vy * dt;
            if (y > maxH) maxH = y;
            points.push({x: x, y: y});
            if (y <= 0) break;
        }
        drawPlot(points, x, maxH);
        return { x, maxH };
    }

    function drawPlot(pts, totalX, totalY) {
        const canvas = document.getElementById('trajectoryCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight, pad = 25;

        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
        const scaleX = (w - pad * 2) / 300; 
        const scaleY = (h - pad * 2) / 60;

        ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(pad, h - pad);
        pts.forEach(p => ctx.lineTo(pad + (p.x * scaleX), (h - pad) - (p.y * scaleY)));
        ctx.stroke();
    }

    function saveShot() {
        const data = runPhysics();
        const shot = {
            id: Date.now(),
            speed: document.getElementById('clubSpeed').value,
            carry: Math.round(data.x),
            height: Math.round(data.maxH * 3)
        };
        sessionShots.push(shot);
        updateShotLog();
    }

    function updateShotLog() {
        const tbody = document.getElementById('shotLog');
        tbody.innerHTML = sessionShots.map(s => `
            <tr>
                <td>${s.speed} mph</td>
                <td>${s.carry} yds</td>
                <td>${s.height} ft</td>
                <td><button class="del-btn" onclick="removeShot(${s.id})">❌</button></td>
            </tr>
        `).reverse().join('');
    }

    function removeShot(id) {
        sessionShots = sessionShots.filter(s => s.id !== id);
        updateShotLog();
    }

    window.onload = runPhysics;
</script>
</body>
</html>
