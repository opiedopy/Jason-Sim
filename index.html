<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jason - GolfSim Pro</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0a; --card: #1a1a1a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #eee; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* MAIN NAVIGATION TABS */
        .nav-tabs { display: flex; background: #000; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 1000; }
        .tab-link { flex: 1; padding: 15px; text-align: center; font-weight: 900; font-size: 13px; color: #666; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .tab-link.active { color: var(--primary); border-bottom: 3px solid var(--primary); background: #111; }

        /* Page Containers */
        .page { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Simulator Styles */
        h1 { color: var(--primary); font-size: 18px; text-align: center; margin-bottom: 15px; }
        .preset-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .preset-btn { flex: 1; background: #222; color: #888; border: 1px solid #333; padding: 12px; border-radius: 8px; font-size: 10px; font-weight: 900; cursor: pointer; }
        .preset-btn.active { background: var(--primary); color: #000; border-color: #fff; }

        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 9px; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; box-sizing: border-box; font-size: 18px; text-align: center; outline: none; }

        #interactiveWrapper { margin: 15px 0; border: 2px solid #333; border-radius: 10px; background: #000; height: 250px; }
        #trajectoryCanvas { width: 100%; height: 100%; display: block; }

        .result-box { background: var(--primary); color: #000; padding: 15px; border-radius: 10px; text-align: center; }
        .result-val { font-size: 32px; font-weight: 900; display: block; }

        /* CSV Vault Styles */
        .vault-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-window { width: 100%; max-height: 70vh; overflow: auto; background: #111; border: 1px solid #333; border-radius: 8px; }
        table { border-collapse: collapse; width: 100%; font-size: 11px; }
        th { background: #222; color: var(--primary); padding: 12px; border: 1px solid #333; position: sticky; top: 0; }
        td { padding: 10px; border: 1px solid #333; text-align: center; white-space: nowrap; }

        .sticky-footer { position: fixed; bottom: 0; width: 100%; background: var(--primary); color: #000; text-align: center; padding: 10px 0; font-weight: 900; font-size: 11px; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <div class="tab-link active" onclick="showPage('sim', this)">Simulator</div>
        <div class="tab-link" onclick="showPage('vault', this)">Data Vault</div>
    </nav>

    <div id="simPage" class="page active">
        <h1>🏌️ JASON GOLFSIM PRO</h1>
        <div class="preset-row">
            <button class="preset-btn active" id="btn-driver" onclick="setPreset('driver')">DRIVER</button>
            <button class="preset-btn" id="btn-iron" onclick="setPreset('iron')">7-IRON</button>
            <button class="preset-btn" id="btn-wedge" onclick="setPreset('wedge')">WEDGE</button>
        </div>

        <div class="card">
            <div class="grid">
                <div><label>Club Speed</label><input type="number" id="clubSpeed" value="111" oninput="runPhysics()"></div>
                <div><label>Attack Angle</label><input type="number" id="attackAngle" value="3.6" oninput="runPhysics()"></div>
                <div><label>Launch Angle</label><input type="number" id="launchAngle" value="12.0" oninput="runPhysics()"></div>
                <div><label>Smash Factor</label><input type="number" id="smashFactor" value="1.45" step="0.01" oninput="runPhysics()"></div>
            </div>

            <div id="interactiveWrapper">
                <canvas id="trajectoryCanvas"></canvas>
            </div>

            <div class="result-box">
                <div class="grid">
                    <div><small>CARRY</small><span class="result-val" id="resDist">--</span></div>
                    <div><small>HEIGHT</small><span class="result-val" id="resHeight">--</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="vaultPage" class="page">
        <div class="vault-header">
            <h2 style="color: var(--primary); margin: 0;">TRACKMAN DATA</h2>
            <button onclick="toggleLock()" id="lockBtn" style="background:none; border:none; font-size:20px;">🔒</button>
        </div>
        
        <div id="adminContent" style="display:none;">
            <input type="file" id="fileInput" style="margin: 15px 0; color: #fff;">
            <div class="table-window">
                <table id="dataTable"></table>
            </div>
        </div>
        <p id="lockMsg" style="text-align:center; color:#444; margin-top:50px;">Unlock with PIN to view data.</p>
    </div>

    <footer class="sticky-footer"> &copy; JMM &bull; 2026 </footer>

<script>
    const presets = {
        driver: { launch: 12.0, smash: 1.45, attack: 3.6 },
        iron: { launch: 18.0, smash: 1.33, attack: -3.0 },
        wedge: { launch: 30.0, smash: 1.22, attack: -5.0 }
    };

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('active'));
        document.getElementById(pageId + 'Page').classList.add('active');
        el.classList.add('active');
        if(pageId === 'sim') runPhysics();
    }

    function toggleLock() {
        if (prompt("Enter Admin PIN:") === "1234") {
            document.getElementById('adminContent').style.display = 'block';
            document.getElementById('lockMsg').style.display = 'none';
            document.getElementById('lockBtn').textContent = "🔓";
        }
    }

    function setPreset(type) {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');
        document.getElementById('launchAngle').value = presets[type].launch;
        document.getElementById('smashFactor').value = presets[type].smash;
        document.getElementById('attackAngle').value = presets[type].attack;
        runPhysics();
    }

    function runPhysics() {
        const clubSpeed = parseFloat(document.getElementById('clubSpeed').value) || 0;
        const smash = parseFloat(document.getElementById('smashFactor').value) || 0;
        const launch = parseFloat(document.getElementById('launchAngle').value) || 0;

        const ballSpeedYps = (clubSpeed * smash) * 0.488889;
        const angleRad = launch * (Math.PI / 180);

        let vx = ballSpeedYps * Math.cos(angleRad), vy = ballSpeedYps * Math.sin(angleRad);
        const g = 10.72, drag = 0.0020, lift = 0.0006;
        let x = 0, y = 0.5, dt = 0.01, points = [], maxH = 0;

        for (let t = 0; t < 1500; t++) {
            let v = Math.sqrt(vx*vx + vy*vy);
            if (v < 0.1) break;
            vx += (-(drag * v * vx)) * dt;
            vy += (-g - (drag * v * vy) + (lift * v * vx)) * dt;
            x += vx * dt; y += vy * dt;
            if (y > maxH) maxH = y;
            points.push({x: x, y: y});
            if (y <= 0) break;
        }
        document.getElementById('resDist').textContent = Math.round(x) + " yds";
        document.getElementById('resHeight').textContent = Math.round(maxH * 3) + " ft";
        drawPlot(points, x, maxH);
    }

    function drawPlot(pts, totalX, totalY) {
        const canvas = document.getElementById('trajectoryCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight, pad = 25;

        ctx.fillStyle = "#000"; ctx.fillRect(0, 0, w, h);
        const scaleX = (w - pad * 2) / Math.max(totalX, 280);
        const scaleY = (h - pad * 2) / Math.max(totalY, 50);

        ctx.strokeStyle = "#333"; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(pad, h-pad); ctx.lineTo(w-pad, h-pad); ctx.stroke();

        ctx.strokeStyle = "#00d4ff"; ctx.lineWidth = 4; ctx.beginPath();
        ctx.moveTo(pad, h - pad);
        pts.forEach(p => ctx.lineTo(pad + (p.x * scaleX), (h - pad) - (p.y * scaleY)));
        ctx.stroke();

        ctx.fillStyle = "#fff"; ctx.beginPath();
        ctx.arc(pad + (totalX * scaleX), h - pad, 4, 0, Math.PI * 2); ctx.fill();
    }

    document.getElementById('fileInput').addEventListener('change', function(e){
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event){
            const rows = event.target.result.split('\n').map(r => r.split(',')).filter(r => r.length > 1);
            let html = "<thead><tr>" + rows[0].map(h => `<th>${h.trim()}</th>`).join('') + "</tr></thead><tbody>";
            rows.slice(1).forEach(row => html += "<tr>" + row.map(v => `<td>${v.trim()}</td>`).join('') + "</tr>");
            document.getElementById('dataTable').innerHTML = html + "</tbody>";
        };
        reader.readAsText(file);
    });

    window.onload = runPhysics;
</script>
</body>
</html>
